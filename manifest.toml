#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "immich"
name = "Immich"
description.en = "Photo and video backup solution directly from your mobile phone"
description.fr = "Sauvegarde de photos et de vidéos directement depuis votre mobile"

version = "2.6.3~ynh2"

maintainers = ["ewilly"]

[upstream]
license = "AGPL-3.0-or-later"
website = "https://immich.app"
demo = "https://demo.immich.app"
admindoc = "https://github.com/immich-app/immich#getting-started"
userdoc = "https://github.com/immich-app/immich#getting-started"
code = "https://github.com/immich-app/immich"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = false

ldap = false
sso = false

disk = "3G"
ram.build = "2G"
ram.runtime = "2G"

[install]
	[install.domain]
	type = "domain"

	[install.init_main_permission]
	type = "group"
	default = "visitors"

[resources]
	[resources.sources]

	[resources.sources.immich_prebuilt_bookworm]
	amd64.url = "https://github.com/YunoHost-Apps/immich-build/releases/download/immich-v2.6.3/immich-v2.6.3-bookworm-amd64.tar.gz"
	amd64.sha256 = "466446ef53ff9bbab4f269ae2805769a22742fca4e087fa9b41719929264b867"
	arm64.url = "https://github.com/YunoHost-Apps/immich-build/releases/download/immich-v2.6.3/immich-v2.6.3-bookworm-arm64.tar.gz"
	arm64.sha256 = "9a333e52db2d9999867d0308c85738257100acb5070ab16be772cc8db0168478"

	prefetch = false

	[resources.sources.immich_prebuilt_trixie]
	amd64.url = "https://github.com/YunoHost-Apps/immich-build/releases/download/immich-v2.6.3/immich-v2.6.3-trixie-amd64.tar.gz"
	amd64.sha256 = "7afe461b920394ad6befc52d37f0876d930d0a192cdb640e35fd2f7a461305f8"
	arm64.url = "https://github.com/YunoHost-Apps/immich-build/releases/download/immich-v2.6.3/immich-v2.6.3-trixie-arm64.tar.gz"
	arm64.sha256 = "7c86553c91864c14b19ff2d00e5ed6a2dfbe9116bc34c6a32459eee8dbadedb8"

	prefetch = false

	[resources.sources.vchord]
	# Version https://github.com/immich-app/base-images/blob/main/postgres/versions.yaml
	# and https://github.com/mmomjian/immich/blob/c9e251c78cb606d22ae74f3ec24cae7090756747/server/src/constants.ts#L17
	amd64.url = "https://github.com/tensorchord/VectorChord/releases/download/1.1.1/postgresql-17-vchord_1.1.1-1_amd64.deb"
	amd64.sha256 = "a48132c8d616c0d52a9811b32f12f88a8f6cc8542d7cc0180c8d0986bfbd03c5"
	arm64.url = "https://github.com/tensorchord/VectorChord/releases/download/1.1.1/postgresql-17-vchord_1.1.1-1_arm64.deb"
	arm64.sha256 = "50ae776bb2376f2b21aea646984cef51e96cc8ae49626cceccb043432c3ba1aa"

	format = "whatever"
	extract = false
	rename = "postgresql-17-vchord.deb"
	prefetch = true

	[resources.system_user]

	[resources.install_dir]

	[resources.data_dir]

	[resources.permissions]
	main.url = "/"
	api.url = "/api"
	api.allowed = "visitors"
	api.show_tile = false
	api.protected = true

	[resources.ports]
	main.default = 2283
	machinelearning.default = 3003

	[resources.apt]
	packages = [
		"postgresql",
		"redis-server",
		"uuid-runtime",
		"curl",
		"unzip",
		"libgl1",
		"libglib2.0-0",
		"libexpat1",
		"libexif12",
		"libgif7",
		"libjpeg62-turbo",
		"libpng16-16",
		"libwebp7",
		"libtiff6",
		"libcgif0",
		"liblcms2-2",
		"libaom3",
		"libde265-0",
		"libimagequant0",
		"libwebpdemux2",
		"libcgif0",
		"libexif12"
	]
	packages_from_raw_bash = """
	if [[ $YNH_DEBIAN_VERSION == "trixie" ]]; then
		echo "libdav1d7, postgresql-17-pgvector";
	elif [[ $YNH_DEBIAN_VERSION == "bookwrom" ]]; then
		echo "libdav1d6";
	fi
	"""

	[resources.apt.extras.jellyfin-ffmpeg]
	repo = "deb https://repo.jellyfin.org/debian __YNH_DEBIAN_VERSION__ main"
	key = "https://repo.jellyfin.org/jellyfin_team.gpg.key"
	packages = [
		"jellyfin-ffmpeg7"
	]

	[resources.database]
	type = "postgresql"

	[resources.nodejs]
	version = "24.14.1"

