#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "immich"
name = "Immich"
description.en = "Photo and video backup solution directly from your mobile phone"
description.fr = "Sauvegarde de photos et de vidéos directement depuis votre mobile"

version = "2.7.2~ynh1"

maintainers = ["ewilly"]

[upstream]
license = "AGPL-3.0-or-later"
website = "https://immich.app"
demo = "https://demo.immich.app"
admindoc = "https://github.com/immich-app/immich#getting-started"
userdoc = "https://github.com/immich-app/immich#getting-started"
code = "https://github.com/immich-app/immich"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = false

ldap = false
sso = false

disk = "3G"
ram.build = "2G"
ram.runtime = "2G"

[install]
	[install.domain]
	type = "domain"

	[install.init_main_permission]
	type = "group"
	default = "visitors"

[resources]
	[resources.sources]

	[resources.sources.immich_prebuilt_bookworm]
	amd64.url = "https://github.com/YunoHost-Apps/immich-build/releases/download/immich-v2.7.2/immich-v2.7.2-bookworm-amd64.tar.gz"
	amd64.sha256 = "f66093af345e39f37098db11fc434a9e933a8a5a9b57e558d30791379af058f5"
	arm64.url = "https://github.com/YunoHost-Apps/immich-build/releases/download/immich-v2.7.2/immich-v2.7.2-bookworm-arm64.tar.gz"
	arm64.sha256 = "002efa0179ad94932960e633fb7f453d3f83ee21eb7db088c3b2e42243c03b9f"

	prefetch = false

	[resources.sources.immich_prebuilt_trixie]
	amd64.url = "https://github.com/YunoHost-Apps/immich-build/releases/download/immich-v2.7.2/immich-v2.7.2-trixie-amd64.tar.gz"
	amd64.sha256 = "d87feabbfa524e289e3ebe403a9cf0a9b50148d5948cc5e5da0e8264c6ec52e7"
	arm64.url = "https://github.com/YunoHost-Apps/immich-build/releases/download/immich-v2.7.2/immich-v2.7.2-trixie-arm64.tar.gz"
	arm64.sha256 = "a24a05c85f39e4464b521e978e21a7dec73d3194763d5a1a1b486aa7a9809e18"

	prefetch = false

	[resources.sources.vchord]
	# Version https://github.com/immich-app/base-images/blob/main/postgres/versions.yaml
	# and https://github.com/mmomjian/immich/blob/c9e251c78cb606d22ae74f3ec24cae7090756747/server/src/constants.ts#L17
	amd64.url = "https://github.com/tensorchord/VectorChord/releases/download/1.1.1/postgresql-17-vchord_1.1.1-1_amd64.deb"
	amd64.sha256 = "a48132c8d616c0d52a9811b32f12f88a8f6cc8542d7cc0180c8d0986bfbd03c5"
	arm64.url = "https://github.com/tensorchord/VectorChord/releases/download/1.1.1/postgresql-17-vchord_1.1.1-1_arm64.deb"
	arm64.sha256 = "50ae776bb2376f2b21aea646984cef51e96cc8ae49626cceccb043432c3ba1aa"

	format = "whatever"
	extract = false
	rename = "postgresql-17-vchord.deb"
	prefetch = true

	[resources.system_user]

	[resources.install_dir]

	[resources.data_dir]

	[resources.permissions]
	main.url = "/"
	api.url = "/api"
	api.allowed = "visitors"
	api.show_tile = false
	api.protected = true

	[resources.ports]
	main.default = 2283
	machinelearning.default = 3003

	[resources.apt]
	packages = [
		"postgresql",
		"redis-server",
		"uuid-runtime",
		"curl",
		"unzip",
		"libgl1",
		"libglib2.0-0",
		"libexpat1",
		"libexif12",
		"libgif7",
		"libjpeg62-turbo",
		"libpng16-16",
		"libwebp7",
		"libtiff6",
		"libcgif0",
		"liblcms2-2",
		"libaom3",
		"libde265-0",
		"libimagequant0",
		"libwebpdemux2",
		"libcgif0",
		"libexif12"
	]
	packages_from_raw_bash = """
	if [[ $YNH_DEBIAN_VERSION == "trixie" ]]; then
		echo "libdav1d7, postgresql-17-pgvector";
	elif [[ $YNH_DEBIAN_VERSION == "bookwrom" ]]; then
		echo "libdav1d6";
	fi
	"""

	[resources.apt.extras.jellyfin-ffmpeg]
	repo = "deb https://repo.jellyfin.org/debian __YNH_DEBIAN_VERSION__ main"
	key = "https://repo.jellyfin.org/jellyfin_team.gpg.key"
	packages = [
		"jellyfin-ffmpeg7"
	]

	[resources.database]
	type = "postgresql"

	[resources.nodejs]
	version = "24.14.1"
