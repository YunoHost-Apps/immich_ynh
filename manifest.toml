#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "immich"
name = "Immich"
description.en = "Photo and video backup solution directly from your mobile phone"
description.fr = "Sauvegarde de photos et de vidéos directement depuis votre mobile"

version = "2.6.1~ynh1"

maintainers = ["ewilly"]

[upstream]
license = "AGPL-3.0-or-later"
website = "https://immich.app"
demo = "https://demo.immich.app"
admindoc = "https://github.com/immich-app/immich#getting-started"
userdoc = "https://github.com/immich-app/immich#getting-started"
code = "https://github.com/immich-app/immich"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = false

ldap = false
sso = false

disk = "3G"
ram.build = "2G"
ram.runtime = "2G"

[install]
	[install.domain]
	type = "domain"

	[install.init_main_permission]
	type = "group"
	default = "visitors"

[resources]
	[resources.sources]

	[resources.sources.immich_prebuilt_bookworm]
	amd64.url = "https://github.com/YunoHost-Apps/immich-build/releases/download/immich-v2.6.1/immich-v2.6.1-bookworm-amd64.tar.gz"
	amd64.sha256 = "241953777c2fc2fda8ba545cabf593b41583c0b9cf6ff40f18b13b901e8c8d69"
	arm64.url = "https://github.com/YunoHost-Apps/immich-build/releases/download/immich-v2.6.1/immich-v2.6.1-bookworm-arm64.tar.gz"
	arm64.sha256 = "04f2329d884071cb4a17b78134ee5387db18adacc0025b692ad10823ac70beb0"

	prefetch = false

	[resources.sources.immich_prebuilt_trixie]
	amd64.url = "https://github.com/YunoHost-Apps/immich-build/releases/download/immich-v2.6.1/immich-v2.6.1-trixie-amd64.tar.gz"
	amd64.sha256 = "730949f09183a6110d5759c7596c032d7eaf19a06caa5c3ba7b814fa1d9d1c2c"
	arm64.url = "https://github.com/YunoHost-Apps/immich-build/releases/download/immich-v2.6.1/immich-v2.6.1-trixie-arm64.tar.gz"
	arm64.sha256 = "9b18edebb1c1f97ff988660d305c13c7bd77bbea143200f03b8998e4eb9b096b"

	prefetch = false

	[resources.sources.vchord]
	# Version https://github.com/immich-app/base-images/blob/main/postgres/versions.yaml
	amd64.url = "https://github.com/tensorchord/VectorChord/releases/download/0.5.3/postgresql-17-vchord_0.5.3-1_amd64.deb"
	amd64.sha256 = "d27910baaf86de52af19e25a9d6198dfecf1dbe50864075b0a9386cdc7de2c9b"
	arm64.url = "https://github.com/tensorchord/VectorChord/releases/download/0.5.3/postgresql-17-vchord_0.5.3-1_arm64.deb"
	arm64.sha256 = "8ddf63b52526cc3cecb3336a379b290e865a9919b9379c55b412ade26ffd2c47"

	format = "whatever"
	extract = false
	rename = "postgresql-17-vchord.deb"
	prefetch = true

	[resources.system_user]

	[resources.install_dir]

	[resources.data_dir]

	[resources.permissions]
	main.url = "/"
	api.url = "/api"
	api.allowed = "visitors"
	api.show_tile = false
	api.protected = true

	[resources.ports]
	main.default = 2283
	machinelearning.default = 3003

	[resources.apt]
	packages = [
		"postgresql",
		"redis-server",
		"uuid-runtime",
		"curl",
		"unzip",
		"libgl1",
		"libglib2.0-0",
		"libexpat1",
		"libexif12",
		"libgif7",
		"libjpeg62-turbo",
		"libpng16-16",
		"libwebp7",
		"libtiff6",
		"libcgif0",
		"liblcms2-2",
		"libaom3",
		"libde265-0",
		"libimagequant0",
		"libwebpdemux2",
		"libcgif0",
		"libexif12"
	]
	packages_from_raw_bash = """
	if [[ $YNH_DEBIAN_VERSION == "trixie" ]]; then
		echo "libdav1d7, postgresql-17-pgvector";
	elif [[ $YNH_DEBIAN_VERSION == "bookwrom" ]]; then
		echo "libdav1d6";
	fi
	"""

	[resources.apt.extras.jellyfin-ffmpeg]
	repo = "deb https://repo.jellyfin.org/debian __YNH_DEBIAN_VERSION__ main"
	key = "https://repo.jellyfin.org/jellyfin_team.gpg.key"
	packages = [
		"jellyfin-ffmpeg7"
	]

	[resources.database]
	type = "postgresql"

	[resources.nodejs]
	version = "24.12.0"

