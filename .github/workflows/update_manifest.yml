name: Update manifest after release

on:
  release:
    types: [published]

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:

      - name: 🔍 Fetch release metadata
        shell: bash
        run: |
          echo "::group::🔍 Fetching release metadata (assets)"
          set -euo pipefail

          owner_repo="${{ github.repository }}"
          tag="${{ github.event.release.tag_name }}"

          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${owner_repo}/releases/tags/${tag}" \
            > release.json

          jq -r '.assets[] | select(.name|test("^meta-.*\\.json$")) | .browser_download_url' release.json \
            > meta_urls.txt

          echo "::endgroup::"

      - name: 📥 Download metadata
        shell: bash
        run: |
          echo "::group::📥 Downloading metadata"
          mkdir -p meta

          while read -r url; do
            echo "→ $url"
            curl -fsSL -o "meta/$(basename "$url")" "$url"
          done < meta_urls.txt

          echo "::endgroup::"

      - name: 📂 Checkout testing branch
        uses: actions/checkout@v6
        with:
          ref: testing
          fetch-depth: 0

      - name: 🌿 Create update branch
        id: create-branch
        shell: bash
        run: |
          echo "::group::🌿 Creating new branch"
          tag="${{ github.event.release.tag_name }}"
          new_branch="update-manifest-${tag}"
          git switch -c "$new_branch"
          echo "branch=$new_branch" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: 📦 Install tomlkit
        shell: bash
        run: |
          pip3 install tomlkit

      - name: ✏️ Update manifest.toml
        shell: bash
        run: |
          echo "::group::✏️ Updating manifest.toml"

          raw="${{ github.event.release.tag_name }}"
          IMMICH_VERSION="${raw#immich-v}"
          NODE_VERSION=$(jq -r '.node_version' meta/meta-*.json | head -n1)

          export IMMICH_VERSION NODE_VERSION

          python3 .github/scripts/update_manifest.py

          echo "::endgroup::"

      - name: 💾 Commit changes
        shell: bash
        run: |
          echo "::group::💾 Committing changes"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.toml
          git diff --cached --quiet || git commit -m "chore(manifest): update to immich v${IMMICH_VERSION}"
          echo "::endgroup::"

      - name: 🔀 Create Pull Request to testing
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Update manifest for Immich v${{ env.IMMICH_VERSION }}"
          body: |
            This PR updates `manifest.toml` following the latest Immich release.
            - version → `{{ env.IMMICH_VERSION }}~ynh1`
            - nodejs → `{{ env.NODE_VERSION }}`
            - updated prebuilt metadata for each distro
          base: testing
          branch: ${{ steps.create-branch.outputs.branch }}
          labels: automated, manifest, release
