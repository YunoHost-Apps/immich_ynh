name: Update manifest after immich-build release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag from immich-build (leave empty to fetch latest)"
        required: false
        type: string

  schedule:
    - cron: "0 5 * * *"   # daily at 05:00 UTC = + 2 hours vs the built workflow

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

env:
  SOURCE_REPO: YunoHost-Apps/immich-build
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  update-manifest:
    runs-on: ubuntu-latest

    steps:
      ######################################################################
      # FETCH RELEASE META (AUTO OR MANUAL)
      ######################################################################
      - name: 🔍 Determine which release to fetch
        id: select-release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          echo "::group::🔍 Selecting release from ${SOURCE_REPO}"
          set -euo pipefail

          if [[ -n "${INPUT_TAG:-}" ]]; then
            api="https://api.github.com/repos/${SOURCE_REPO}/releases/tags/${INPUT_TAG}"
          else
            api="https://api.github.com/repos/${SOURCE_REPO}/releases/latest"
          fi

          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
                     -H "Accept: application/vnd.github+json" "$api" > release.json

          VERSION="$(jq -r '.tag_name // .name' release.json)"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

          jq -r '.assets[]
                 | select(.name|startswith("immich-v") and endswith("-manifest.json"))
                 | .browser_download_url' release.json > manifest_url.txt

          if [[ ! -s manifest_url.txt ]]; then
            echo "::error::No immich-v*-manifest.json asset found."
            exit 1
          fi

          echo "::endgroup::"

      ######################################################################
      # CHECKOUT TESTING BRANCH (needed to read manifest.toml)
      ######################################################################
      - name: 📂 Checkout testing branch
        uses: actions/checkout@v4
        with:
          ref: testing
          fetch-depth: 0

      ######################################################################
      # SKIP WORKFLOW IF MANIFEST ALREADY MATCHES THIS IMMICH VERSION
      ######################################################################
      - name: ⏹ Skip if manifest already updated
        id: skip-check
        shell: bash
        run: |
          echo "::group::⏹ Checking manifest version"
          set -euo pipefail

          TAG="${{ steps.select-release.outputs.tag }}"
          IMMICH_VERSION="${TAG#immich-v}"

          CURRENT_VERSION="$(grep -E '^version' manifest.toml | sed 's/.*"\(.*\)".*/\1/')"
          CURRENT_VERSION="${CURRENT_VERSION%%~ynh*}"

          echo "Current manifest immich version: $CURRENT_VERSION"
          echo "Target immich version:   $IMMICH_VERSION"

          if [[ "$CURRENT_VERSION" == "${IMMICH_VERSION}" ]]; then
            echo "🟢 Already up-to-date → skipping workflow."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "🔄 Update required."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

          echo "::endgroup::"

      ######################################################################
      # DOWNLOAD GLOBAL MANIFEST.JSON
      ######################################################################
      - name: 📥 Download global manifest
        if: steps.skip-check.outputs.skip != 'true'
        shell: bash
        run: |
          echo "::group::📥 Download"
          mkdir -p meta
          curl -fsSL -o meta/global.json "$(cat manifest_url.txt)"
          echo "::endgroup::"

      ######################################################################
      # VALIDATE JSON version matches release tag
      ######################################################################
      - name: ✅ Validate version
        if: steps.skip-check.outputs.skip != 'true'
        shell: bash
        run: |
          tag="${{ steps.select-release.outputs.tag }}"
          json_ver="$(jq -r '.immich_version' meta/global.json)"
          if [[ "$tag" != *"v${json_ver}"* ]]; then
            echo "::warning::Release tag does not contain immich_version ($json_ver)"
          fi

      ######################################################################
      # CREATE UPDATE BRANCH
      ######################################################################
      - name: 🌿 Create update branch
        if: steps.skip-check.outputs.skip != 'true'
        id: create-branch
        shell: bash
        run: |
          VERSION="${{ steps.select-release.outputs.tag }}"
          BR="update-manifest-${VERSION}"
          git switch -c "$BR" || git switch "$BR"
          echo "branch=$BR" >> "$GITHUB_OUTPUT"

      ######################################################################
      # PYTHON DEPS
      ######################################################################
      - name: 📦 Install tomlkit
        if: steps.skip-check.outputs.skip != 'true'
        run: pip3 install tomlkit

      ######################################################################
      # EXTRACT DATA FROM GLOBAL JSON
      ######################################################################
      - name: ✏️ Extract metadata
        if: steps.skip-check.outputs.skip != 'true'
        id: extract
        shell: bash
        run: |
          IMMICH_VERSION="$(jq -r '.immich_version' meta/global.json)"
          NODE_VERSION="$(jq -r '.node_version' meta/global.json)"

          echo "IMMICH_VERSION=$IMMICH_VERSION" >> $GITHUB_ENV
          echo "NODE_VERSION=$NODE_VERSION"     >> $GITHUB_ENV

      ######################################################################
      # RUN PYTHON SCRIPT (update manifest)
      ######################################################################
      - name: ✏️ Update manifest.toml
        if: steps.skip-check.outputs.skip != 'true'
        shell: bash
        run: |
          export IMMICH_VERSION NODE_VERSION
          python3 .github/scripts/update_manifest.py

      ######################################################################
      # COMMIT
      ######################################################################
      - name: 💾 Commit changes
        if: steps.skip-check.outputs.skip != 'true'
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.toml
          git diff --cached --quiet || git commit -m "chore(manifest): update to immich v${IMMICH_VERSION}"

      ######################################################################
      # CREATE PULL REQUEST
      ######################################################################
      - name: 🔀 Create Pull Request
        if: steps.skip-check.outputs.skip != 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Update manifest for immich v${{ env.IMMICH_VERSION }}"
          body: |
            Manifest automatically updated from upstream immich-build release.
            - immich → `${{ env.IMMICH_VERSION }}~ynh1`
            - nodejs → `${{ env.NODE_VERSION }}`
          base: testing
          branch: ${{ steps.create-branch.outputs.branch }}
          labels: automated, manifest, release

      ######################################################################
      # BUILD COMMENT SUMMARY
      ######################################################################
      - name: 📝 Build PR summary
        if: ${{ steps.cpr.outputs.pull-request-number }}
        shell: bash
        run: |
          mkdir -p meta
          TAG="${{ steps.select-release.outputs.tag }}"
          RELEASE_URL="https://github.com/${SOURCE_REPO}/releases/tag/${TAG}"

          {
            echo "🔗 **Upstream release:** ${RELEASE_URL}"
            echo
            echo "**Summary**"
            echo "- immich: \`${IMMICH_VERSION}\`"
            echo "- node:   \`${NODE_VERSION}\`"
            echo
            echo "**Assets**"
            echo "| distro | arch | file | sha256 | url |"
            echo "|--------|------|------|--------|-----|"
          } > meta/comment.md

          jq -r '
            . as $r
            | ["bookworm","trixie"][] as $d
            | select($r[$d] != null)
            | $r[$d] as $o
            | ["amd64","arm64"][] as $a
            | {
                distro: $d,
                arch: $a,
                file: ($o[$a+"_file"] // ""),
                sha:  ($o[$a+"_sha256"] // ""),
                url:  ($o[$a+"_url"] // "")
              }
            | select(.file != "" or .sha != "" or .url != "")
            | "| \(.distro) | \(.arch) | \(.file) | `\(.sha)` | \(.url) |"
          ' meta/global.json >> meta/comment.md

      ######################################################################
      # COMMENT: summary
      ######################################################################
      - name: 💬 Comment summary
        if: ${{ steps.cpr.outputs.pull-request-number }}
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.cpr.outputs.pull-request-number }}
          body-path: meta/comment.md

      ######################################################################
      # COMMENT: !testme
      ######################################################################
      - name: 💬 Comment !testme
        if: ${{ steps.cpr.outputs.pull-request-number }}
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.cpr.outputs.pull-request-number }}
          body: "!testme"
