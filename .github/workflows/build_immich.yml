name: Build immich with libvips (multi-arch)

on:
  workflow_dispatch:
    inputs:
      debian:
        description: 'Debian versions to build (comma-separated: bookworm, trixie)'
        required: true
        default: 'bookworm,trixie'
      arch:
        description: |
          CPU architecture to build (comma-separated: amd64, arm64)
          Note: arm64 currently cannot build due to missing Flutter linux/arm64 binary
        required: true
        default: 'amd64'

  schedule:
    - cron: '0 2 * * *'

jobs:

  ##########################################################################
  # PREPARE
  ##########################################################################

  prepare:
    runs-on: ubuntu-latest
    outputs:
      immich_version:  ${{ steps.get-versions.outputs.immich_version }}
      node_version:    ${{ steps.get-versions.outputs.node_version }}
      pnpm_version:    ${{ steps.get-versions.outputs.pnpm_version }}
      python_version:  ${{ steps.get-versions.outputs.python_version }}
      libheif_version: ${{ steps.get-versions.outputs.libheif_version }}
      vips_version:    ${{ steps.get-versions.outputs.vips_version }}
      should_build:    ${{ steps.check-version.outputs.should_build }}
      matrix_debian:   ${{ steps.set-matrix.outputs.matrix_debian }}
      matrix_arch:     ${{ steps.set-matrix.outputs.matrix_arch }}

      install_dir:     /var/www/immich
      source_dir:      /var/www/immich/source
      vips_dir:        /var/www/immich/vips
      app_dir:         /var/www/immich/immich/app
      plugin_dir:      /var/www/immich/immich/app/corePlugin
      ml_dir:          /var/www/immich/immich/app/machine-learning
      ml_cache_dir:    /var/www/immich/immich/.cache_ml

    steps:

      - name: Get upstream versions
        id: get-versions
        shell: bash
        run: |
          set -euo pipefail

          IMMICH_VERSION=$(curl -sIL https://github.com/immich-app/immich/releases/latest \
            | grep -i location | sed -n 's@.*/tag/v\([^"]*\).*@\1@p' | tr -d '\r[:space:]')
          echo "immich_version=$IMMICH_VERSION" >> $GITHUB_OUTPUT

          NODE_VERSION=$(curl -s https://raw.githubusercontent.com/immich-app/base-images/refs/heads/main/server/Dockerfile \
            | sed -nE 's@.*node:([0-9]+\.[0-9]+\.[0-9]+).*@\1@p' | head -n1)
          echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT

          PNPM_VERSION=$(curl -s https://raw.githubusercontent.com/immich-app/immich/refs/tags/v$IMMICH_VERSION/package.json \
            | jq -r '.packageManager | split("@")[1] | split(".")[0]')
          echo "pnpm_version=$PNPM_VERSION" >> $GITHUB_OUTPUT

          PYTHON_VERSION=$(curl -s https://raw.githubusercontent.com/immich-app/immich/refs/heads/main/machine-learning/.python-version)
          echo "python_version=$PYTHON_VERSION" >> $GITHUB_OUTPUT

          LIBHEIF_VERSION=$(curl -s https://raw.githubusercontent.com/immich-app/base-images/main/server/sources/libheif.json | jq -r '.version')
          echo "libheif_version=$LIBHEIF_VERSION" >> $GITHUB_OUTPUT

          VIPS_VERSION=$(curl -s https://raw.githubusercontent.com/immich-app/base-images/main/server/sources/libvips.json | jq -r '.version')
          echo "vips_version=$VIPS_VERSION" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6

      - name: Check if release already exists
        id: check-version
        shell: bash
        run: |
          TAG="immich-v${{ steps.get-versions.outputs.immich_version }}"
          if git ls-remote --exit-code --tags origin "$TAG" ; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Build matrix
        id: set-matrix
        if: steps.check-version.outputs.should_build == 'true'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            debian="${{ github.event.inputs.debian }}"
            arch="${{ github.event.inputs.arch }}"
          else
            debian="bookworm,trixie"
            arch="amd64"
          fi

          MATRIX_DEBIAN=$(echo "$debian" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$"; ""))')
          echo "matrix_debian=$MATRIX_DEBIAN" >> $GITHUB_OUTPUT

          MATRIX_ARCH=$(echo "$arch" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$"; ""))')
          echo "matrix_arch=$MATRIX_ARCH" >> $GITHUB_OUTPUT




  ##########################################################################
  # BUILD (multi-arch + multi-distro + global manifest.json)
  ##########################################################################

  build:
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'

    strategy:
      matrix:
        debian: ${{ fromJson(needs.prepare.outputs.matrix_debian) }}
        arch:   ${{ fromJson(needs.prepare.outputs.matrix_arch) }}

    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}

    container:
      image: debian:${{ matrix.debian }}-slim

    env:
      NODE_ENV: production
      NODE_OPTIONS: "--max_old_space_size=4096"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
      CI: 1
      CURL_OPTS: "--fail --location --retry 3 --retry-delay 2"

    outputs:
      exec_time: ${{ steps.build-immich.outputs.exec_time }}
      peak_ram:  ${{ steps.build-immich.outputs.peak_ram }}
      disk_used: ${{ steps.build-immich.outputs.disk_used }}

    steps:

      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}

      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y \
            bash \
            curl \
            libssl-dev \
            libffi-dev \
            uuid-runtime \
            autoconf \
            tar \
            unzip \
            perl \
            libnet-ssleay-perl \
            libio-socket-ssl-perl \
            libcapture-tiny-perl \
            libfile-which-perl \
            libfile-chdir-perl \
            libpkgconfig-perl \
            libffi-checklib-perl \
            libtest-warnings-perl \
            libtest-fatal-perl \
            libtest-needs-perl \
            libtest2-suite-perl \
            libsort-versions-perl \
            libpath-tiny-perl \
            libtry-tiny-perl \
            libterm-table-perl \
            libany-uri-escape-perl \
            libmojolicious-perl \
            libfile-slurper-perl \
            liblcms2-2 \
            build-essential \
            cmake \
            meson \
            ninja-build \
            pkg-config \
            xz-utils \
            ccache \
            libgl1 \
            libdav1d-dev \
            libwebp-dev \
            libaom-dev \
            libde265-dev \
            libexif-dev \
            libexpat1-dev \
            libglib2.0-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libgif-dev \
            libcgif-dev \
            libimagequant-dev \
            libraw-dev \
            jq

      - name: Install pnpm
        run: |
          corepack enable --install-directory=/usr/local/bin
          corepack use pnpm@${{ needs.prepare.outputs.pnpm_version }}

      - name: Install mise
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            curl -s https://mise.jdx.dev/mise-latest-linux-x64 > /usr/local/bin/mise
          elif [ "${{ matrix.arch }}" = "arm64" ]; then
            curl -s https://mise.jdx.dev/mise-latest-linux-arm64 > /usr/local/bin/mise
          else
            exit 1
          fi
          chmod 755 /usr/local/bin/mise


      ##########################################################################
      # BUILD IMMICH — VERSION NON TRONQUÉE
      ##########################################################################

      - name: Build immich
        id: build-immich
        shell: bash
        run: |
          set -euxo pipefail

          ######################################################################
          # DIR STRUCTURE
          ######################################################################
          echo "::group::📁 Creating folder structure"
          install_dir="${{ needs.prepare.outputs.install_dir }}"
          source_dir="${{ needs.prepare.outputs.source_dir }}"
          vips_dir="${{ needs.prepare.outputs.vips_dir }}"
          app_dir="${{ needs.prepare.outputs.app_dir }}"
          plugin_dir="${{ needs.prepare.outputs.plugin_dir }}"
          ml_dir="${{ needs.prepare.outputs.ml_dir }}"
          ml_cache_dir="${{ needs.prepare.outputs.ml_cache_dir }}"

          mkdir -p "$install_dir" "$source_dir" "$vips_dir" "$app_dir" "$plugin_dir" "$ml_dir" "$ml_cache_dir"
          echo "::endgroup::"


          ######################################################################
          # STATS START
          ######################################################################
          echo "::group::⏱️ Starting statistics"
          date_before=$(date +%s)
          disk_before=$(df -k / | tail -1 | awk '{print $3}')
          echo "::endgroup::"


          ######################################################################
          # LIBHEIF
          ######################################################################
          echo "::group::🧩 Building libheif"
          cd /tmp
          curl $CURL_OPTS -o h.tgz \
            https://github.com/strukturag/libheif/releases/download/v${{ needs.prepare.outputs.libheif_version }}/libheif-${{ needs.prepare.outputs.libheif_version }}.tar.gz
          tar xzf h.tgz
          cd libheif-*
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX="$vips_dir" -DWITH_EXAMPLES=OFF -DWITH_DAV1D=ON -DWITH_AOM_ENCODER=ON -DWITH_LIBDE265=ON
          make -j"$(nproc)"
          make install
          echo "::endgroup::"


          ######################################################################
          # LIBVIPS
          ######################################################################
          echo "::group::🌈 Building libvips"
          export PKG_CONFIG_PATH="$vips_dir/lib/pkgconfig"
          export LD_LIBRARY_PATH="$vips_dir/lib"
          cd /tmp
          curl $CURL_OPTS -o v.xz \
            https://github.com/libvips/libvips/releases/download/v${{ needs.prepare.outputs.vips_version }}/vips-${{ needs.prepare.outputs.vips_version }}.tar.xz
          tar xf v.xz
          cd vips-*
          meson setup build --prefix="$vips_dir" --libdir=lib -Dintrospection=disabled -Dtiff=disabled
          ninja -C build install
          echo "::endgroup::"


          ######################################################################
          # IMMICH SOURCE
          ######################################################################
          echo "::group::📥 Downloading immich source"
          cd "$source_dir"
          curl $CURL_OPTS -o src.tgz \
            https://github.com/immich-app/immich/archive/refs/tags/v${{ needs.prepare.outputs.immich_version }}.tar.gz
          tar xzf src.tgz --strip-components=1
          rm src.tgz
          echo "::endgroup::"


          ######################################################################
          # PATCHES
          ######################################################################
          echo "::group::🩹 Applying patches"
          cd "$source_dir"

          # Replace /usr/src
          (grep -Rl "/usr/src" || true) \
            | xargs -r sed -i "s@/usr/src@$install_dir/immich@g"

          # Replace '/build'
          (grep -RlE "\"/build\"|'/build'" || true) \
            | xargs -r sed -i \
              -e "s@\"/build\"@\"$app_dir\"@g" \
              -e "s@'/build'@'$app_dir'@g"

          # Fix extism/js-pdk for bookworm
          if [ "${{ matrix.debian }}" = "bookworm" ]; then
            sed -i 's@github:extism/js-pdk@github:ewilly/js-pdk@g' "$source_dir/plugins/mise.toml"
          fi

          echo "::endgroup::"


          ######################################################################
          # SERVER
          ######################################################################
          echo "::group::🛠️ Building immich server"
          cd "$source_dir/server"
          export COREPACK_ENABLE_DOWNLOAD_PROMPT=0
          export CI=1
          export SHARP_IGNORE_GLOBAL_LIBVIPS=true
          pnpm --filter immich --frozen-lockfile build
          unset SHARP_IGNORE_GLOBAL_LIBVIPS
          export SHARP_FORCE_GLOBAL_LIBVIPS=true
          pnpm --filter immich --frozen-lockfile --prod --no-optional deploy "$app_dir" --force
          cp "$app_dir/package.json" "$app_dir/bin/"
          sed -i "s@^start@./start@g" "$app_dir/bin/immich-admin"
          echo "::endgroup::"


          ######################################################################
          # WEB
          ######################################################################
          echo "::group::🌐 Building immich web + sdk"
          cd "$source_dir"
          pnpm --filter @immich/sdk --filter immich-web --frozen-lockfile --force install
          unset SHARP_FORCE_GLOBAL_LIBVIPS
          export SHARP_IGNORE_GLOBAL_LIBVIPS=true
          pnpm --filter @immich/sdk --filter immich-web build
          cp -a web/build "$app_dir/www/"
          echo "::endgroup::"


          ######################################################################
          # CLI
          ######################################################################
          echo "::group::🔧 Building immich CLI"
          cd "$source_dir"
          pnpm --filter @immich/sdk --filter @immich/cli --frozen-lockfile install
          pnpm --filter @immich/sdk --filter @immich/cli build
          pnpm --filter @immich/cli --prod --no-optional deploy "$app_dir/cli"
          ln -s "$app_dir/cli/bin/immich" "$app_dir/bin/immich"
          echo "::endgroup::"


          ######################################################################
          # PLUGINS
          ######################################################################
          echo "::group::🔌 Building immich plugins"
          cd "$source_dir/plugins"
          mise trust --ignore ../mise.toml
          mise trust ./mise.toml
          mise install
          mise run build
          cp -r dist "$plugin_dir/"
          cp manifest.json "$plugin_dir/"
          echo "::endgroup::"


          ######################################################################
          # ASSETS
          ######################################################################
          echo "::group::➡️ Updating static assets"
          cp "$source_dir/LICENSE" "$app_dir/"
          rm "$app_dir/bin/start.sh"
          echo "::endgroup::"


          ######################################################################
          # MACHINE LEARNING
          ######################################################################
          echo "::group::🧠 Building ML stack"
          cd "$source_dir/machine-learning"
          mise use uv@latest --quiet
          export UV_PYTHON_INSTALL_DIR="$ml_dir"
          mise exec -- uv venv "$ml_dir/venv" \
            --link-mode copy \
            --python "${{ needs.prepare.outputs.python_version }}" \
            --managed-python
          source "$ml_dir/venv/bin/activate"
          mise exec -- uv sync --offline --locked --active --extra cpu --no-dev || \
            mise exec -- uv sync --locked --active --extra cpu --no-dev
          cp -a ann "$ml_dir/"
          cp -a immich_ml "$ml_dir/"
          echo "::endgroup::"


          ######################################################################
          # STATS END
          ######################################################################
          echo "::group::⏱️ Ending statistics"

          date_after=$(date +%s)
          disk_after=$(df -k / | tail -1 | awk '{print $3}')
          dur=$((date_after - date_before))

          if [ -f /sys/fs/cgroup/memory.peak ]; then
            peak=$(cat /sys/fs/cgroup/memory.peak)
          else
            peak=0
          fi

          echo "exec_time=$(printf '%02d:%02d:%02d' $((dur/3600)) $((dur%3600/60)) $((dur%60)))" >> $GITHUB_OUTPUT
          echo "disk_used=$(awk -v a="$disk_after" -v b="$disk_before" 'BEGIN{ printf "%.2fGB",(a-b)/1024/1024 }')" >> $GITHUB_OUTPUT
          echo "peak_ram=$(awk -v v="$peak" 'BEGIN{ printf "%.2fGB",v/1024/1024/1024 }')" >> $GITHUB_OUTPUT
          echo "::endgroup::"



      ##########################################################################
      # TAR CREATION
      ##########################################################################

      - name: 📦 Creating final tarball
        shell: bash
        run: |
          echo "::group::📦 Creating final tarball"

          immich="${{ needs.prepare.outputs.immich_version }}"
          cd /var/www

          tar czf "immich-v${immich}-${{ matrix.debian }}-${{ matrix.arch }}.tar.gz" immich
          mv immich-v*.tar.gz /tmp/

          echo "::endgroup::"



      ##########################################################################
      # MINI META JSON (PER DISTRO × ARCH)
      ##########################################################################

      - name: 📝 Creating manifest metadata JSON
        shell: bash
        run: |
          echo "::group::📝 Creating manifest metadata JSON"

          immich="${{ needs.prepare.outputs.immich_version }}"
          distro="${{ matrix.debian }}"
          arch="${{ matrix.arch }}"
          repo="${{ github.repository }}"
          tag="immich-v${immich}"

          tarfile="immich-v${immich}-${distro}-${arch}.tar.gz"
          tarurl="https://github.com/${repo}/releases/download/${tag}/${tarfile}"
          tarsha=$(sha256sum "/tmp/${tarfile}" | awk '{print $1}')

          jq -n \
            --arg distro "$distro" \
            --arg arch "$arch" \
            --arg tarfile "$tarfile" \
            --arg tarurl "$tarurl" \
            --arg tarsha "$tarsha" \
            '{
              distro: $distro,
              arch:   $arch,
              tar: { file: $tarfile, url: $tarurl, sha256: $tarsha }
            }' \
            > "/tmp/meta-${distro}-${arch}.json"

          echo "::endgroup::"



      ##########################################################################
      # GLOBAL MANIFEST JSON (UNIQUE FINAL FILE)
      ##########################################################################

      - name: 📦 Build final global manifest JSON
        shell: bash
        run: |
          echo "::group::📦 Building global multi-arch manifest JSON"

          immich="${{ needs.prepare.outputs.immich_version }}"
          node="${{ needs.prepare.outputs.node_version }}"
          pnpm="${{ needs.prepare.outputs.pnpm_version }}"
          python="${{ needs.prepare.outputs.python_version }}"
          mise="$(mise version --json | jq -r .version)"

          outfile="/tmp/immich-v${immich}-manifest.json"

          # Base JSON
          jq -n \
            --arg immich "$immich" \
            --arg node "$node" \
            --arg pnpm "$pnpm" \
            --arg python "$python" \
            --arg mise "$mise" \
            '
            {
              immich_version: $immich,
              node_version:   $node,
              pnpm_version:   $pnpm,
              python_version: $python,
              mise_version:   $mise
            }
            ' > "$outfile"

          # Inject per‑distro / per‑arch block
          for meta in /tmp/meta-*.json; do
            distro=$(jq -r '.distro' "$meta")
            arch=$(jq -r '.arch' "$meta")
            file=$(jq -r '.tar.file' "$meta")
            url=$(jq -r '.tar.url'  "$meta")
            sha=$(jq -r '.tar.sha256' "$meta")

            jq \
              --arg distro "$distro" \
              --arg arch "$arch" \
              --arg file "$file" \
              --arg url "$url" \
              --arg sha "$sha" \
              '
                . as $root
                | if ($root[$distro] | type) == "object" then . else .[$distro] = {} end
                | $root[$distro][($arch + "_file")]   = $file
                | $root[$distro][($arch + "_url")]    = $url
                | $root[$distro][($arch + "_sha256")] = $sha
              ' "$outfile" > "${outfile}.tmp"

            mv "${outfile}.tmp" "$outfile"
          done

          echo "::endgroup::"



      ##########################################################################
      # UPLOAD ARTIFACTS
      ##########################################################################

      - name: Upload tarballs
        uses: actions/upload-artifact@v4
        with:
          name: "immich-${{ matrix.debian }}-${{ matrix.arch }}"
          path: /tmp/immich-v*-*.tar.gz
          retention-days: 1

      - name: Upload global manifest
        uses: actions/upload-artifact@v4
        with:
          name: global-manifest
          path: /tmp/immich-v*-manifest.json
          retention-days: 1




  ##########################################################################
  # RELEASE JOB
  ##########################################################################

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.should_build == 'true'

    permissions:
      contents: write

    steps:

      ######################################################################
      # DOWNLOAD ARTIFACTS
      ######################################################################
      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts


      ######################################################################
      # CREATE RELEASE
      ######################################################################
      - name: 🚀 Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: immich-v${{ needs.prepare.outputs.immich_version }}
          name:     "immich v${{ needs.prepare.outputs.immich_version }}"
          files:    artifacts/**/*
          body: |
            ## 🚀 immich v${{ needs.prepare.outputs.immich_version }} for YunoHost

            This release was automatically built using the multi‑architecture build workflow.

            ---

            ## 📦 Component Versions

            **Source Components**
            - immich: `${{ needs.prepare.outputs.immich_version }}`
            - libheif: `${{ needs.prepare.outputs.libheif_version }}`
            - libvips: `${{ needs.prepare.outputs.vips_version }}`

            **Build Environment**
            - Node.js: `${{ needs.prepare.outputs.node_version }}`
            - pnpm: `${{ needs.prepare.outputs.pnpm_version }}`
            - Python: `${{ needs.prepare.outputs.python_version }}`

            ---

            ## 📊 Build Statistics (from *Build immich*)

            - ⏱️ Execution time: `${{ needs.build.outputs.exec_time }}`
            - 🧠 Peak RAM usage: `${{ needs.build.outputs.peak_ram }}`
            - 💾 Disk space used: `${{ needs.build.outputs.disk_used }}`

            ---

            ## 📁 Artifacts

            All compiled artifacts (amd64 + arm64, all distros) are available in the Assets section below.



      ######################################################################
      # CLEAN ARTIFACTS (optional)
      ######################################################################
      - name: 🧹 Delete uploaded artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            immich-*
            global-manifest
