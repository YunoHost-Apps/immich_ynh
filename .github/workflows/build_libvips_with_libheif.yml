name: Build libvips with libheif (multi-arch via buildx)

on:
  workflow_dispatch:
    inputs:
      libs_dir:
        description: 'Prefix installation directory (ignored with buildx)'
        required: false
        default: '/opt/vips'
      debian_versions:
        description: 'Comma-separated: bookworm,trixie'
        required: true
        default: 'bookworm,trixie'

  schedule:
    - cron: '0 2 * * *'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      libheif_version: ${{ steps.get.outputs.libheif }}
      vips_version: ${{ steps.get.outputs.vips }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Get versions
        id: get
        run: |
          LIBHEIF=$(curl -s https://raw.githubusercontent.com/immich-app/base-images/main/server/sources/libheif.json | jq -r '.version')
          VIPS=$(curl -s https://raw.githubusercontent.com/immich-app/base-images/main/server/sources/libvips.json | jq -r '.version')

          echo "libheif=$LIBHEIF" >> $GITHUB_OUTPUT
          echo "vips=$VIPS" >> $GITHUB_OUTPUT

          echo "Libheif: $LIBHEIF"
          echo "Vips: $VIPS"

      - name: Checkout for tag check
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if build needed
        id: check
        run: |
          TAG="vips-${{ steps.get.outputs.vips }}-heif-${{ steps.get.outputs.libheif }}"

          if git rev-parse -q --verify "refs/tags/$TAG"; then
            echo "Tag already exists → skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Tag does not exist → build triggered."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Compute matrix
        id: set-matrix
        if: steps.check.outputs.should_build == 'true'
        run: |
          VERSIONS="${{ github.event.inputs.debian_versions || 'bookworm,trixie' }}"
          MATRIX=$(echo "$VERSIONS" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$"; ""))')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        debian_version: ${{ fromJson(needs.prepare.outputs.matrix) }}
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build image for ${{ matrix.debian_version }} - ${{ matrix.arch }}
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .github/docker/vips
          file: .github/docker/vips/Dockerfile
          platforms: linux/${{ matrix.arch }}
          build-args: |
            VIPS_VERSION=${{ needs.prepare.outputs.vips_version }}
            HEIF_VERSION=${{ needs.prepare.outputs.libheif_version }}
            DEBIAN_VERSION=${{ matrix.debian_version }}
          outputs: type=local,dest=./out

      - name: Pack artifact
        run: |
          cd out/linux_${{ matrix.arch }}
          tar czf \
            vips-${{ needs.prepare.outputs.vips_version }}-heif-${{ needs.prepare.outputs.libheif_version }}-${{ matrix.debian_version }}-${{ matrix.arch }}.tar.gz \
            opt
          mv *.tar.gz /tmp/

      - uses: actions/upload-artifact@v4
        with:
          name: vips-${{ matrix.debian_version }}-${{ matrix.arch }}
          path: /tmp/*.tar.gz

  release:
    needs: [prepare, build]
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: vips-${{ needs.prepare.outputs.vips_version }}-heif-${{ needs.prepare.outputs.libheif_version }}
          name: vips ${{ needs.prepare.outputs.vips_version }} with libheif ${{ needs.prepare.outputs.libheif_version }}
          body: |
            Built using **Docker Buildx multi-architecture (amd64 + arm64)**.

            - libheif: `${{ needs.prepare.outputs.libheif_version }}`
            - libvips: `${{ needs.prepare.outputs.vips_version }}`
          files: artifacts/**/*
          draft: false
          prerelease: false
